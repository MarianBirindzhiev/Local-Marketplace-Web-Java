spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema:
    show-sql: false
    open-in-view: false

  liquibase:
    enabled: false
    
  h2:
    console:
      enabled: true
      path: /h2-console

marketplace:
  log-level: ERROR
  log-file: logs/marketplace-test.log

logging:
  level:
    root: WARN
    bg.sofia.uni.fmi.localmarketplace: ERROR

app:
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHk=
    expiration-ms: 3600000   # 1 hour — short for tests